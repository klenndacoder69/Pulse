version: '3.8'

services:
  # redis for caching
  redis-cache:
    image: redis:alpine
    ports:
      - "6379:6379"

  # postgres for storing cache
  postgres-db:
    image: postgres:alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: telemetry
    ports:
      - "5432:5432"

  # ingestion 
  ingestion-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      # This hostname perfectly matches the service name defined above!
      - REDIS_HOST=redis-cache
    depends_on:
      - redis-cache

  # worker
  etl-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - REDIS_HOST=redis-cache
      - DB_HOST=postgres-db
    depends_on:
      - redis-cache
      - postgres-db
