version: '3.8'

services:
  # redis for caching
  redis-cache:
    image: redis:alpine
    ports:
      - "6379:6379"

  # postgres for storing cache
  postgres-db:
    image: postgres:alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"

  # ingestion
  ingestion-api:
    image: pulse-api:latest
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=${REDIS_HOST}
    depends_on:
      - redis-cache

  # worker
  etl-worker:
    image: pulse-worker:latest
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - DB_HOST=${DB_HOST}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
    depends_on:
      - redis-cache
      - postgres-db

  # grafana
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    depends_on:
      - postgres-db

  # telemetry agent (running in background as a checker)
  pulse-agent:
    image: pulse-agent:latest
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      # Use internal Docker DNS to route directly to the API container
      - API_URL=http://ingestion-api:8080/ingest
    # pid: host allows the container to read the actual host's /proc/stat
    pid: host
    depends_on:
      - ingestion-api
